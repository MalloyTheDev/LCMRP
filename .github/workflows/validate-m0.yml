name: Validate M0 research contracts

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install pinned validation dependencies
        run: |
          python -m pip install --requirement requirements-dev.lock
          python -m pip check

      - name: Validate repository contracts
        run: python tools/validate_repository.py

      - name: Run validator tests
        run: python -m unittest discover --start-directory tests --verbose

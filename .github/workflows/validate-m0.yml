name: Validate LCMRP research contracts

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.lock

      - name: Install pinned validation dependencies
        run: |
          python -m pip install --requirement requirements-dev.lock
          python -m pip check

      - name: Run taxonomy case-access containment mutations
        run: >
          python tests/run_no_case_access_gate.py --
          python -m unittest tests.test_taxonomy_case_access_containment --verbose

      - name: Validate repository without taxonomy case access
        run: >
          python tests/run_no_case_access_gate.py --
          python tools/validate_repository.py

      - name: Run complete suite without taxonomy case access
        run: >
          python tests/run_no_case_access_gate.py --
          python -m unittest discover --start-directory tests --verbose
